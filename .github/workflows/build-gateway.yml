name: Build Gateway

on:
  push:
    tags:
      - "gateway-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. gateway-v0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, no push)'
        required: false
        type: boolean
        default: false

env:
  IMAGE_NAME: ghcr.io/openabdev/openab-gateway

jobs:
  build:
    strategy:
      matrix:
        platform:
          - { os: linux/amd64, runner: ubuntu-latest }
          - { os: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#gateway-v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          platforms: ${{ matrix.platform.os }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ inputs.dry_run != true }}
          cache-from: type=gha,scope=gateway-${{ matrix.platform.os }}
          cache-to: type=gha,scope=gateway-${{ matrix.platform.os }},mode=max

      - name: Export digest
        if: inputs.dry_run != true
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: gateway-digest-${{ matrix.platform.runner }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    needs: build
    if: ${{ !cancelled() && (github.event_name == 'push' || inputs.dry_run != true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "version=${TAG#gateway-v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: gateway-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd /tmp/digests
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}" \
            -t "${IMAGE_NAME}:v${VERSION}" \
            -t "${IMAGE_NAME}:latest" \
            $(printf "${IMAGE_NAME}@sha256:%s " *)

  release:
    needs: [build, merge]
    if: ${{ !cancelled() && needs.merge.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#gateway-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cat > /tmp/release-notes.md << EOF
          ## OpenAB Gateway v${VERSION}

          Unified binary with all gateway adapters (Telegram, LINE, Feishu, Google Chat, WeCom, Teams) compiled in via \`BUILD_MODE=unified\`.

          > **Note**: This image contains the full openab binary with all adapters enabled, not a standalone gateway process. It replaces the previous standalone gateway binary.

          ### Docker

          \`\`\`bash
          docker pull ghcr.io/openabdev/openab-gateway:${VERSION}
          \`\`\`

          Multi-arch: linux/amd64 + linux/arm64

          ### Links

          - [Gateway Crate README](https://github.com/openabdev/openab/blob/main/crates/openab-gateway/README.md)
          - [ADR: Custom Gateway](https://github.com/openabdev/openab/blob/main/docs/adr/custom-gateway.md)
          EOF
          sed -i 's/^          //' /tmp/release-notes.md
          gh release create "$TAG" \
            --title "Gateway v${VERSION}" \
            --notes-file /tmp/release-notes.md
