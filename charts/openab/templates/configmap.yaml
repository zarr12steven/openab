{{- range $name, $cfg := .Values.agents }}
{{- if ne (include "openab.agentEnabled" $cfg) "false" }}
{{- if not $cfg.configUrl }}
{{- $d := dict "ctx" $ "agent" $name "cfg" $cfg }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openab.agentFullname" $d }}
  labels:
    {{- include "openab.labels" $d | nindent 4 }}
data:
  {{- if $cfg.configToml }}
  config.toml: |
{{ $cfg.configToml | indent 4 }}
  {{- else }}
  {{- fail (printf "agents.%s: Helm-rendered config (slack.*, discord.*, pool.*, etc.) was removed in chart v0.10.0. Migrate to configToml to write your config.toml directly in values.yaml, or use configUrl for platform-agnostic config. See https://github.com/openabdev/openab/blob/main/docs/migrate-to-configtoml.md" $name) }}
  {{- end }}
  {{- if $cfg.agentsMd }}
  AGENTS.md: |
    {{- $cfg.agentsMd | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
